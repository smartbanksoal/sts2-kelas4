<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis IND-STS-K4-S2-HOTS</title>
    <style>
        /* Desain Umum & Anti-Copas */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; /* Anti copy-paste */
        }
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Container Utama */
        .container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 700px;
            margin: 40px auto;
            padding: 30px;
            flex-grow: 1;
        }

        /* Header */
        .header-code {
            text-align: center;
            font-weight: bold;
            color: #ff6b6b;
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 2px dashed #ff6b6b;
            padding-bottom: 10px;
        }

        /* Tampilan Login */
        #login-screen {
            display: block;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn {
            background-color: #4facfe;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
            width: 100%;
        }
        .btn:hover { background-color: #00f2fe; }
        .btn-home {
            background-color: #ff9f43;
            margin-bottom: 20px;
        }
        .btn-home:hover { background-color: #ee5253; }

        /* Tampilan Kuis */
        #quiz-screen { display: none; }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: #555;
        }
        .question-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .question-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #eee;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            text-align: left;
            transition: 0.2s;
        }
        .option-btn:hover:not(:disabled) { background-color: #e2e6ea; }
        .option-btn.correct {
            background-color: #28a745 !important;
            color: white;
            border-color: #28a745;
        }
        .option-btn.wrong {
            background-color: #dc3545 !important;
            color: white;
            border-color: #dc3545;
        }
        .option-btn:disabled { cursor: not-allowed; }

        /* Navigasi Kuis & Pembahasan */
        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #d1ecf1;
            color: #0c5460;
            border-left: 5px solid #17a2b8;
            border-radius: 5px;
            display: none;
            font-size: 0.95rem;
        }
        .navigation-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }
        .nav-btn {
            flex: 1;
            background-color: #6c5ce7;
            display: none;
        }
        .nav-btn:hover { background-color: #a29bfe; }
        .btn-prev { background-color: #b2bec3; display: block; }
        .btn-prev:hover { background-color: #dfe6e9; color: #333; }

        /* Riwayat Skor */
        #history-section {
            margin-top: 30px;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
        }
        .history-item {
            border-bottom: 1px solid #ccc;
            padding: 8px 0;
            font-size: 0.9rem;
        }

        /* Footer */
        footer {
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: auto;
            font-size: 0.9rem;
        }
        footer a {
            color: #4facfe;
            text-decoration: none;
            font-weight: bold;
        }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body oncontextmenu="return false;">

            <button class="btn btn-home" onclick="window.location.href='../index.html'">Kembali ke Home</button>

    <script>

            { id: 1, text: "Budi suka membaca buku di perpustakaan setiap hari agar pintar. Apa kegiatan rutin Budi?", img: "", alt: "",

            { id: 3, text: "Mentari pagi bersinar terang, burung berkicau sangat riang. Suasana puisi tersebut adalah...", img: "", alt: "",

              explanation: "Kalimat efektif harus hemat kata dan menghindari kata yang berlebihan (mubazir)." },
            { id: 17, text: "Sesuai dengan cerita yang sering kita baca, manfaat utama dari kebiasaan menabung adalah...", img: "", alt: "", 
              options: [ {t: "Punya dana cadangan", c: true}, {t: "Uang cepat habis", c: false}, {t: "Menjadi sangat boros", c: false}, {t: "Dompet cepat rusak", c: false} ], 
              explanation: "Menabung bermanfaat untuk mempersiapkan dana cadangan di masa depan." },
            { id: 18, text: "Perhatikan gambar berikut. Langkah manual yang tepat untuk memeriksa keaslian uang kertas adalah...", 
              img: "gambar/cek_uang.jpg", alt: "Gambar seseorang menerawang uang kertas di cahaya terang", 
              options: [ {t: "Dilihat dan diraba", c: true}, {t: "Dicuci dan dijemur", c: false}, {t: "Digunting dan dilem", c: false}, {t: "Dicoret dan dilipat", c: false} ], 
              explanation: "Cara standar mengecek keaslian uang kertas adalah 3D: Dilihat, Diraba, Ditrawang." },
            { id: 19, text: "Sebuah kalimat baru bisa dikatakan utuh dan efektif apabila minimal memiliki...", img: "", alt: "",

              explanation: "Struktur dasar sebuah kalimat efektif harus memiliki sekurang-kurangnya Subjek dan Predikat." },
            { id: 20, text: "Dalam menulis teks prosedur tentang cara menggunakan alat, jenis kalimat yang dipakai adalah...", img: "", alt: "",

              explanation: "Bahasa puisi bersifat kiasan, padat, dan memiliki makna yang mendalam." },

              img: "gambar/kutu_buku.jpg", alt: "Gambar ilustrasi seorang anak sedang tersenyum membaca banyak tumpukan buku", 
              options: [ {t: "Dia kutu buku", c: true}, {t: "Dia anak nakal", c: false}, {t: "Dia sangat malas", c: false}, {t: "Dia suka tidur", c: false} ], 
              explanation: "'Kutu buku' adalah majas metafora untuk menyebut orang yang sangat gemar membaca." },
            { id: 24, text: "Perhatikan gambar wanita anggun di pedesaan ini. Sebutan kiasan yang tepat untuknya adalah...", 
              img: "gambar/kembang_desa.jpg", alt: "Gambar seorang gadis desa cantik yang sedang memegang bunga", 
              options: [ {t: "Sang kembang desa", c: true}, {t: "Sang preman pasar", c: false}, {t: "Sang ratu jalanan", c: false}, {t: "Sang anak bawang", c: false} ], 
              explanation: "'Kembang desa' merupakan kiasan untuk gadis yang paling cantik di sebuah desa." },
            { id: 25, text: "Orang itu tidak disukai teman-temannya karena ia dikenal panjang tangan. Makna panjang tangan adalah...", img: "", alt: "", 
              options: [ {t: "Suka mengambil barang", c: true}, {t: "Suka menolong teman", c: false}, {t: "Suka memberi uang", c: false}, {t: "Suka membersihkan kelas", c: false} ], 
              explanation: "Panjang tangan adalah ungkapan negatif yang bermakna suka mencuri atau mengambil barang orang lain." }
        ];

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let user = { name: '', class: '' };
        let answeredQuestions = [];

        // Fungsi Load History
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const historyList = document.getElementById('history-list');
            if (history.length > 0) {
                // Menampilkan riwayat tanpa menghapus (sesuai instruksi)
                historyList.innerHTML = history.map(h => 
                    `<div class="history-item"><b>${h.name}</b> (Kelas ${h.class}) - Skor: <b>${h.score}</b><br><small>${h.time}</small></div>`
                ).join('');
            } else {
                historyList.innerHTML = "Belum ada riwayat pengerjaan.";
            }
        }

        // Acak Array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Mulai Kuis
        function startQuiz() {
            const nama = document.getElementById('nama').value.trim();
            const kelas = document.getElementById('kelas').value.trim();

            if (!nama || !kelas) {
                alert("Harap isi nama dan kelas terlebih dahulu!");
                return;
            }

            // Aturan 3: Reset Variabel Secara Menyeluruh
            user.name = nama;
            user.class = kelas;
            score = 0;
            currentQuestionIndex = 0;
            
            // Aturan 1: Sistem Flagging disiapkan dengan array kosong bernilai null
            answeredQuestions = new Array(questions.length).fill(null); 
            
            // Acak soal
            currentQuestions = shuffleArray([...questions]);
            
            // Acak opsi untuk setiap soal
            currentQuestions.forEach(q => {
                q.shuffledOptions = shuffleArray([...q.options]);
            });

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            updateScoreDisplay();
            loadQuestion();
        }

        function updateScoreDisplay() {
            // Hitung jawaban benar (terfilter otomatis oleh sistem flagging array)
            let correctAnswers = answeredQuestions.filter(ans => ans && ans.isCorrect).length;
            
            // Aturan 4: Perhitungan Berbasis Persentase
            let calculatedScore = (correctAnswers / currentQuestions.length) * 100;
            
            // Aturan 2: Penggunaan Fungsi Pembatas (limiter) agar tidak lebih dari 100
            score = Math.min(Math.round(calculatedScore), 100); 

            document.getElementById('live-score').textContent = `Skor Sementara: ${score}`;
        }

        // Render Soal
        function loadQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('q-number').textContent = `Soal ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
            
            let html = ``;
            if (q.img) {
                html += `<img src="${q.img}" alt="${q.alt}" class="question-image">`;
            }
            html += `<div class="question-text">${q.text}</div>`;
            html += `<div class="options" id="options-container"></div>`;
            
            document.getElementById('question-container').innerHTML = html;
            
            const optionsContainer = document.getElementById('options-container');
            const explanationDiv = document.getElementById('explanation');
            explanationDiv.style.display = 'none';
            explanationDiv.innerHTML = `<b>Pembahasan:</b> ${q.explanation}`;

            let hasAnswered = answeredQuestions[currentQuestionIndex] !== null;

            q.shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${String.fromCharCode(65 + index)}. ${opt.t}`;
                
                if (hasAnswered) {
                    btn.disabled = true;
                    if (answeredQuestions[currentQuestionIndex].text === opt.t) {
                        btn.classList.add(opt.c ? 'correct' : 'wrong');
                    }
                    if (opt.c && !answeredQuestions[currentQuestionIndex].isCorrect) {
                        btn.style.border = "2px solid #28a745";
                        btn.style.color = "#28a745";
                    }
                } else {
                    btn.onclick = () => selectAnswer(btn, opt);
                }
                optionsContainer.appendChild(btn);
            });

            if (hasAnswered) {
                explanationDiv.style.display = 'block';
            }

            updateNavButtons();
        }

        // Pilih Jawaban
        function selectAnswer(btn, opt) {
            const optionsDiv = document.getElementById('options-container');
            const buttons = optionsDiv.getElementsByTagName('button');
            
            for (let b of buttons) {
                b.disabled = true;
            }

            // Set Flag jawaban
            answeredQuestions[currentQuestionIndex] = { text: opt.t, isCorrect: opt.c };

            if (opt.c) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                for (let b of buttons) {
                    if (b.textContent.substring(3) === currentQuestions[currentQuestionIndex].shuffledOptions.find(o => o.c).t) {
                        b.style.border = "2px solid #28a745";
                        b.style.color = "#28a745";
                    }
                }
            }

            document.getElementById('explanation').style.display = 'block';
            updateScoreDisplay();
            updateNavButtons();
        }

        // Navigasi
        function updateNavButtons() {
            const hasAnswered = answeredQuestions[currentQuestionIndex] !== null;
            
            document.getElementById('btn-prev').style.display = currentQuestionIndex > 0 ? 'block' : 'none';
            
            const btnNext = document.getElementById('btn-next');
            const btnFinish = document.getElementById('btn-finish');

            if (currentQuestionIndex < currentQuestions.length - 1) {
                btnNext.style.display = hasAnswered ? 'block' : 'none';
                btnFinish.style.display = 'none';
            } else {
                btnNext.style.display = 'none';
                btnFinish.style.display = hasAnswered ? 'block' : 'none';
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        // Selesai Kuis & Komunikasi ke Rekap
        function finishQuiz() {
            updateScoreDisplay();
            
            const sessionData = {
                name: user.name,
                class: user.class,
                score: score,
                quiz_id: QUIZ_ID, // Tag identitas penting untuk direkap
                time: new Date().toLocaleString('id-ID')
            };

            // Simpan ke local storage internal halaman ini (tanpa batas pemotongan array agar histori aman)
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            history.unshift(sessionData);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); 

            // ==========================================
            // KOMUNIKASI DENGAN FILE rekap.html 
            // ==========================================
            
            // Metode 1: Simpan ke Global LocalStorage (Dapat diakses oleh file HTML lain di domain yang sama)
            let sharedRekap = JSON.parse(localStorage.getItem("global_rekap_skor")) || [];
            sharedRekap.unshift(sessionData);
            localStorage.setItem("global_rekap_skor", JSON.stringify(sharedRekap));

            // Metode 2: Menggunakan postMessage jika file ini dibuka di dalam iframe oleh rekap.html
            const messagePayload = {
                type: 'QUIZ_SUBMITTED',
                payload: sessionData
            };
            if (window.opener) {
                window.opener.postMessage(messagePayload, '*');
            } else if (window.parent !== window) {
                window.parent.postMessage(messagePayload, '*');
            }

            alert(`Kuis Selesai!\nNama: ${user.name}\nKelas: ${user.class}\nSkor Akhir: ${score}`);
            
            // Reset ke layar awal
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('nama').value = '';
            document.getElementById('kelas').value = '';
            loadHistory();
        }

        // Load history saat halaman dibuka
        window.onload = loadHistory;
    </script>
</body>
</html>
