        // Acak Array
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function startQuiz() {
            const name = document.getElementById('student-name').value;
            const kelas = document.getElementById('student-class').value;

                alert("Silakan isi nama dan kelas terlebih dahulu!");
                return;
            }

            studentData = { name, kelas, time: new Date().toLocaleString() };
            
            questions = JSON.parse(JSON.stringify(soalMaster)); 
            shuffleArray(questions);
            questions.forEach(q => shuffleArray(q.options));

            currentQuestionIndex = 0;
            score = 0;
            answeredQuestions = new Array(questions.length).fill(false);
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            
            updateScoreDisplay();
            showQuestion();

        function showQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${q.text}`;
            
            const imgContainer = document.getElementById('image-container');
            imgContainer.innerHTML = '';
            if(q.image) {
                const img = document.createElement('img');
                img.src = q.image.src;
                img.alt = q.image.alt;
                img.className = 'question-img';
                imgContainer.appendChild(img);
            }

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                
                if(answeredQuestions[currentQuestionIndex]) {
                    btn.disabled = true;
                    if(opt.isCorrect) btn.classList.add('correct');
                    else if(btn.innerText === answeredQuestions[currentQuestionIndex].userAnswer) {
                        btn.classList.add('wrong');
                    }
                } else {
                    btn.onclick = () => selectOption(opt, btn);
                }
                optionsContainer.appendChild(btn);
            });

            const expBox = document.getElementById('explanation-box');
            if(answeredQuestions[currentQuestionIndex]) {
                expBox.innerHTML = `<strong>Pembahasan:</strong><br>${q.explanation}`;
                expBox.style.display = 'block';
            } else {
                expBox.style.display = 'none';
            }

            document.getElementById('btn-prev').style.display = currentQuestionIndex > 0 ? 'block' : 'none';
            document.getElementById('btn-next').innerText = currentQuestionIndex === questions.length - 1 ? 'Selesai Kuis' : 'Selanjutnya';
        }

                btnElement.classList.add('wrong');
                optionsBtns.forEach(btn => {
                    if(questions[currentQuestionIndex].options.find(o => o.text === btn.innerText && o.isCorrect)) {
                        btn.classList.add('correct');
                    }
                });
            }

            answeredQuestions[currentQuestionIndex] = { userAnswer: opt.text };
            updateScoreDisplay();

            const expBox = document.getElementById('explanation-box');
            expBox.innerHTML = `<strong>Pembahasan:</strong><br>${questions[currentQuestionIndex].explanation}`;
            expBox.style.display = 'block';
        }

        function updateScoreDisplay() {
            let displayScore = Math.round((score / questions.length) * 100);
            if(displayScore > 100) displayScore = 100; 
            document.getElementById('current-score').innerText = displayScore;
        }

        function nextQuestion() {
            if(!answeredQuestions[currentQuestionIndex]) {
                alert("Silakan pilih jawaban terlebih dahulu!");
                return;
            }

            if(currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        function prevQuestion() {
            if(currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        }

        function finishQuiz() {
            let finalScore = Math.round((score / questions.length) * 100);
            studentData.score = finalScore;
            
            let history = JSON.parse(localStorage.getItem(KEY_HISTORY)) || [];
            history.unshift(studentData);
            localStorage.setItem(KEY_HISTORY, JSON.stringify(history));

            let rekapData = JSON.parse(localStorage.getItem('SmartBankSoal_Rekap')) || [];
            rekapData.push({ ...studentData, kode: "PNC-STS-K4-S2-HOTS" });
            localStorage.setItem('SmartBankSoal_Rekap', JSON.stringify(rekapData));

            alert(`Kuis Selesai!\nNama: ${studentData.name}\nSkor Akhir: ${finalScore}`);
            
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('student-name').value = '';
            document.getElementById('student-class').value = '';
            renderHistory();
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem(KEY_HISTORY)) || [];
            const list = document.getElementById('history-list');
            if(history.length === 0) {
                list.innerHTML = 'Belum ada riwayat.';
                return;
            }
            
            list.innerHTML = '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<strong>${item.name}</strong> (${item.kelas}) - Skor: <strong>${item.score}</strong> <br> <small>${item.time}</small>`;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
