            border-radius: 8px;
            font-size: 16px;
        }

            border: none;
            border-radius: 8px;

            font-size: 16px;
            font-weight: bold;

            border-top: 2px dashed #ccc;
            padding-top: 20px;
        }

            padding: 10px;
            text-align: center;

            tbody.innerHTML = '';
            
            if (history.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">Belum ada riwayat pengerjaan.</td></tr>';
            } else {
                history.forEach(data => {
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${data.name}</strong></td>
                            <td>${data.class}</td>
                            <td><strong>${data.score}</strong></td>
                            <td style="font-size: 0.9em; color: gray;">${data.time}</td>
                        </tr>
                    `;
                });
            }
        }

        // Mulai Kuis
        function startQuiz() {
            const nameInput = document.getElementById('studentName').value.trim();
            const classInput = document.getElementById('studentClass').value.trim();

            if (!nameInput || !classInput) {
                alert("Mohon isi Nama Lengkap dan Kelas terlebih dahulu!");
                return;
            }

            userInfo = { name: nameInput, class: classInput };
            score = 0;
            currentQuestionIndex = 0;
            
            document.getElementById('display-user').innerText = `Nama: ${userInfo.name} | Kelas: ${userInfo.class}`;
            
            // Persiapan Soal
            questions = JSON.parse(JSON.stringify(rawQuestions));
            shuffleArray(questions);
            questions.forEach(q => shuffleArray(q.options));
            
            userAnswers = new Array(questions.length).fill(null);
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            
            updateScoreDisplay();
            showQuestion();
        }

        // Fungsi Perhitungan Persentase dan Pembatas (Limiter)
        function updateScoreDisplay() {
            let correctAnswers = 0;
            
            questions.forEach((q, index) => {
                if (userAnswers[index] !== null) {
                    if (q.options[userAnswers[index]].correct) {
                        correctAnswers++;
                    }
                }
            });

            let calculatedScore = (correctAnswers / questions.length) * 100;
            score = Math.min(Math.round(calculatedScore), 100);
            
            document.getElementById('display-score').innerText = `Skor Sementara: ${score}`;
        }

        function showQuestion() {
            const q = questions[currentQuestionIndex];
            
            document.getElementById('question-number').innerText = `Soal No. ${currentQuestionIndex + 1} dari ${questions.length}`;
            document.getElementById('question-text').innerText = q.q;
            
            // Atur Gambar
            const imgContainer = document.getElementById('image-container');
            const imgElement = document.getElementById('question-img');
            if (q.img) {
                imgElement.src = q.img;
                imgContainer.style.display = 'block';
            } else {
                imgContainer.style.display = 'none';
            }

            // Atur Pilihan
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt.text}`;
                
                // Jika sudah pernah dijawab
                if (userAnswers[currentQuestionIndex] !== null) {
                    btn.disabled = true;
                    if (userAnswers[currentQuestionIndex] === index) {
                        btn.classList.add(opt.correct ? 'correct' : 'wrong');
                    }
                    if (opt.correct && userAnswers[currentQuestionIndex] !== index) {
                         btn.style.border = "2px solid #28a745";
                         btn.style.color = "#28a745";
                    }
                } else {
                    btn.onclick = () => selectAnswer(index);
                }
                optionsContainer.appendChild(btn);
            });

            // Atur Pembahasan
            const explanationBox = document.getElementById('explanation-box');
            if (userAnswers[currentQuestionIndex] !== null) {
                document.getElementById('explanation-text').innerText = q.explanation;
                explanationBox.style.display = 'block';
            } else {
                explanationBox.style.display = 'none';
            }

            // Atur Navigasi
            document.getElementById('btn-prev').disabled = currentQuestionIndex === 0;
            
            const nextBtn = document.getElementById('btn-next');
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.innerText = "Selesai & Simpan";
                nextBtn.disabled = userAnswers[currentQuestionIndex] === null; 
            } else {
                nextBtn.innerText = "Soal Selanjutnya";
                nextBtn.disabled = userAnswers[currentQuestionIndex] === null;
            }
        }

        function selectAnswer(selectedIndex) {
            if (userAnswers[currentQuestionIndex] !== null) return;
            
            userAnswers[currentQuestionIndex] = selectedIndex;
            updateScoreDisplay();
            showQuestion(); 
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        }

        function finishQuiz() {
            updateScoreDisplay(); 

            const sessionData = {
                name: userInfo.name,
                class: userInfo.class,
                score: score,
                quiz_id: QUIZ_ID, 
                time: new Date().toLocaleString('id-ID')
            };

            // Simpan ke riwayat lokal halaman ini
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            history.unshift(sessionData); 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));

            // ==========================================
            // KOMUNIKASI DENGAN FILE rekap.html 
            // ==========================================
            
            // Format data diubah agar sesuai dengan ekspektasi rekap.html
            const dataUntukRekap = {
                nama: userInfo.name,
                kelas: userInfo.class,
                mapel: "PAI Kelas 4 - STS",
                nilai: score,
                waktu: sessionData.time
            };

            // Simpan ke localStorage dengan Key yang dicari oleh rekap.html
            let sharedRekap = JSON.parse(localStorage.getItem("dataKuis")) || [];
            sharedRekap.push(dataUntukRekap);
            localStorage.setItem("dataKuis", JSON.stringify(sharedRekap));

            // Metode postMessage (tetap dibiarkan jika dipanggil lewat iframe)
            const messagePayload = {
                type: 'QUIZ_SUBMITTED',
                payload: dataUntukRekap
            };
            if (window.opener) {
                window.opener.postMessage(messagePayload, '*');
            } else if (window.parent !== window) {
                window.parent.postMessage(messagePayload, '*');
            }

            alert(`Kuis selesai!\nSkor akhir Anda: ${score}`);

            // Reset ke tampilan awal
            document.getElementById('studentName').value = '';
            document.getElementById('studentClass').value = '';
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
            
            loadHistory();
        }

        // Jalankan saat pertama kali dimuat
        window.onload = loadHistory;

    </script>
</body>
</html>
