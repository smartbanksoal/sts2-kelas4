    <style>
        /* Desain Umum & Keamanan Anti Copy-Paste */
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --dark-elegant: #1a1a2e;
            --text-light: #f7fff7;
            --success: #2ecc71;
            --danger: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            margin: 0;
            padding: 0;
            color: #333;
            user-select: none; /* Proteksi copy paste */
            -webkit-user-select: none;
            -ms-user-select: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header & Footer */
        header {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        footer {
            background-color: var(--dark-elegant);
            color: var(--text-light);
            text-align: center;
            padding: 15px;
            margin-top: auto;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Container Utama */
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            flex: 1;
        }

        /* Tampilan Layar */
        .screen {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .screen.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Form Login & Input */
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        /* Tombol Ramping Elegan Gelap */
        .btn {
            background-color: var(--dark-elegant);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px; /* Ramping */
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: inline-block;
            text-align: center;
            text-decoration: none;
            margin: 5px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(26, 26, 46, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Tombol Pilihan Jawaban */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
            text-align: left;
        }
        .option-btn:hover {
            border-color: var(--secondary);
            background-color: #e6fcfb;
        }
        .option-btn.correct {
            background-color: var(--success);
            color: white;
            border-color: var(--success);
        }
        .option-btn.wrong {
            background-color: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        /* Skor & Riwayat */
        .score-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
            text-align: right;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .history-table th, .history-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .history-table th {
            background-color: var(--secondary);
            color: white;
        }

        /* Gambar & Pembahasan */
        .question-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
        }

            margin-top: 20px;
            padding: 15px;
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            border-radius: 5px;
            display: none;
            font-weight: 500;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }
    </style>
</head>

        // Unique Data Key untuk mencegah skor bocor antar kuis
        const STORAGE_KEY = 'smartbanksoal_history_pjok_sts_k4';
        
        let state = {
            nama: '', kelas: '', 
            questions: [], currentIdx: 0,
            answersFlag: [], // Sistem Flagging (menandai soal yang sudah dijawab)
            correctCount: 0
        };

        // Fungsi Acak Array (Fisher-Yates)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Tampilkan Riwayat di Login
        function tampilkanRiwayat() {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            
            // Urutkan skor tertinggi
            history.sort((a, b) => b.skor - a.skor);
            
            history.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.nama}</td>
                        <td>${item.kelas}</td>
                        <td style="font-weight:bold; color:var(--primary);">${item.skor}</td>
                        <td>${item.waktu}</td>
                    </tr>
                `;
            });
        }

        function mulaiKuis() {
            const nama = document.getElementById('namaLengkap').value.trim();
            const kelas = document.getElementById('kelas').value.trim();
            
            if(!nama || !kelas) {
                alert("Harap isi Nama dan Kelas terlebih dahulu!");
                return;
            }

            // Total Reset Variabel
            state.nama = nama;
            state.kelas = kelas;
            state.correctCount = 0;
            state.currentIdx = 0;
            state.answersFlag = new Array(bankSoal.length).fill(false);
            
            // Acak Soal dan Pilihan
            let acakSoal = bankSoal.map(s => {
                return {
                    q: s.q, img: s.img, p: s.p,
                    o: shuffle([...s.o]) // Posisi pilihan diacak
                }
            });
            state.questions = shuffle(acakSoal);

            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.active = true;
            document.getElementById('quiz-screen').classList.add('active');
            
            muatSoal();
            updateScoreUI();
        }

            const data = state.questions[state.currentIdx];
            
            document.getElementById('question-number').innerText = `Soal ${state.currentIdx + 1} / ${state.questions.length}`;
            document.getElementById('question-text').innerText = data.q;
            
            // Handle Gambar
            const imgEl = document.getElementById('question-image');
            if(data.img !== "") {
                imgEl.src = data.img;
                imgEl.style.display = "block";
            } else {
                imgEl.style.display = "none";
            }

            // Handle Pilihan
            const optContainer = document.getElementById('options-container');
            optContainer.innerHTML = '';
            
            data.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = String.fromCharCode(65 + idx) + ". " + opt.t;
                
                // Jika soal ini sudah pernah dijawab (Sistem Flagging)
                if(state.answersFlag[state.currentIdx]) {
                    btn.disabled = true;
                    if(opt.c) btn.classList.add('correct');
                } else {
                    btn.onclick = () => cekJawaban(btn, opt.c, optContainer);
                }
                
                optContainer.appendChild(btn);
            });

            // Handle Pembahasan
            const pemb = document.getElementById('pembahasan-container');
            if(state.answersFlag[state.currentIdx]) {
                pemb.innerText = "Pembahasan: " + data.p;
                pemb.style.display = 'block';
            } else {
                pemb.style.display = 'none';
            }

            // Navigasi
            document.getElementById('btn-prev').disabled = state.currentIdx === 0;
            document.getElementById('btn-next').innerText = state.currentIdx === state.questions.length - 1 ? "Selesai" : "Soal Selanjutnya";
            document.getElementById('btn-next').disabled = !state.answersFlag[state.currentIdx];
        }

        function cekJawaban(clickedBtn, isCorrect, container) {
            // Penggunaan Fungsi Pembatas & Flagging (Mencegah multi-click / bocor skor)
            if(state.answersFlag[state.currentIdx]) return; 
            state.answersFlag[state.currentIdx] = true;

            const buttons = container.getElementsByTagName('button');
            const data = state.questions[state.currentIdx];

            for(let btn of buttons) {
                btn.disabled = true;
                // Cari jawaban mana yang sebenarnya benar
                const textAns = btn.innerText.substring(3); // Hapus "A. "
                const isThisAnsCorrect = data.o.find(x => x.t === textAns).c;
                if(isThisAnsCorrect) btn.classList.add('correct');
            }

            if(isCorrect) {
                state.correctCount++;
            } else {
                clickedBtn.classList.add('wrong');
            }

            // Tampilkan pembahasan
            const pemb = document.getElementById('pembahasan-container');
            pemb.innerText = "Pembahasan: " + data.p;
            pemb.style.display = 'block';

            updateScoreUI();
            
            // Buka akses tombol selanjutnya/selesai
            document.getElementById('btn-next').disabled = false;
        }

        function updateScoreUI() {
            // Perhitungan Berbasis Persentase + Limiter Maksimal 100
            let hitungSkor = Math.round((state.correctCount / state.questions.length) * 100);
            let limitSkor = Math.min(100, hitungSkor); 
            document.getElementById('current-score').innerText = limitSkor;
            return limitSkor;
        }

        function gantiSoal(arah) {
            if(arah === 1 && state.currentIdx === state.questions.length - 1) {
                akhiriKuis();
            } else {
                state.currentIdx += arah;
                muatSoal();
            }
        }

        function akhiriKuis() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            
            let skorAkhir = updateScoreUI();
            
            document.getElementById('res-nama').innerText = state.nama;
            document.getElementById('res-kelas').innerText = state.kelas;
            document.getElementById('final-score').innerText = skorAkhir;

            // Simpan ke Local Storage (Tanpa hapus history)
            let history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            let now = new Date();
            let formatWaktu = now.toLocaleDateString('id-ID') + " " + now.toLocaleTimeString('id-ID');
            
            history.push({
                nama: state.nama,
                kelas: state.kelas,
                skor: skorAkhir,
                waktu: formatWaktu
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));

            // Komunikasi dengan rekap.html via PostMessage (Sesuai instruksi)
            try {
                window.parent.postMessage({
                    type: 'QUIZ_RESULT',
                    nama: state.nama,
                    kelas: state.kelas,
                    skor: skorAkhir,
                    kode: 'PJOK-STS-K4-S2-HOTS'
                }, '*');
            } catch(e) { console.log('postMessage error', e); }
        }

        function kembaliKeLogin() {
            document.getElementById('result-screen').classList.remove('active');
            document.getElementById('login-screen').classList.add('active');
            document.getElementById('namaLengkap').value = '';
            document.getElementById('kelas').value = '';
            tampilkanRiwayat();
        }

        // Load awal
        window.onload = tampilkanRiwayat;
    </script>
</body>
</html>
