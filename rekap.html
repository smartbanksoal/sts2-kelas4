<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Nilai Kuis</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            color: #333;
            line-height: 1.6;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px 10px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 15px;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        
        .btn-home { background-color: #607D8B; } 
        .btn-email { background-color: #009688; } 
        .btn-hapus { background-color: #f44336; }
        .btn-pin { background-color: #2196F3; }
        .btn-cetak { background-color: #ff9800; }

        .catatan-penting {
            margin-top: 25px;
            padding: 15px;
            background-color: #fff3cd;
            border-left: 5px solid #ffeeba;
            color: #856404;
            font-size: 0.9em;
        }

        @media print {
            .btn-group, .catatan-penting { display: none; }
            th { background-color: #eee !important; color: #000 !important; }
        }
    </style>
</head>
<body>

    <h2>Riwayat Pengerjaan Kuis</h2>
    
    <table id="tabelRekap">
        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kelas</th>
                <th>Mata Pelajaran</th>
                <th>Nilai</th>
                <th>Waktu</th>
            </tr>
        </thead>
        <tbody id="isiTabel">
            <!-- Data akan diisi oleh JavaScript -->
        </tbody>
    </table>

    <div class="btn-group">
        <button class="btn-home" onclick="window.location.href='index.html'">🏠 Home</button>
        <button class="btn-email" onclick="kirimKeEmail()">✉️ Email</button>
        <button class="btn-cetak" onclick="window.print()">🖨️ Cetak</button>
        <button class="btn-pin" onclick="aturPIN()">⚙️ Atur PIN</button>
        <button class="btn-hapus" onclick="hapusRiwayat()">🗑️ Hapus</button>
    </div>

    <div class="catatan-penting">
        <strong>💡 Catatan:</strong> Jangan hapus Cache/Cookies browser agar riwayat tidak hilang. Simpan data secara berkala.
    </div>

    <script>
        const PIN_DARURAT = "999999"; 

        // Perbaikan: Gunakan DOMContentLoaded agar lebih stabil
        document.addEventListener('DOMContentLoaded', tampilkanData);

        function tampilkanData() {
            const dataRekap = JSON.parse(localStorage.getItem('dataKuis')) || [];
            const tbody = document.getElementById('isiTabel');
            tbody.innerHTML = ''; 

            if (dataRekap.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Belum ada riwayat kuis.</td></tr>';
                return;
            }

            // Gunakan DocumentFragment untuk performa yang lebih baik jika data banyak
            let rows = "";
            dataRekap.forEach((data, index) => {
                rows += `<tr>
                    <td>${index + 1}</td>
                    <td>${data.nama}</td>
                    <td>${data.kelas}</td>
                    <td>${data.mapel}</td>
                    <td><strong>${data.nilai}</strong></td>
                    <td>${data.waktu}</td>
                </tr>`;
            });
            tbody.innerHTML = rows;
        }

        function kirimKeEmail() {
            const dataRekap = JSON.parse(localStorage.getItem('dataKuis')) || [];
            if (dataRekap.length === 0) return alert("Data kosong.");

            const emailGuru = prompt("Masukkan email penerima:");
            if (emailGuru === null) return;

            let bodyText = "Laporan Rekap Nilai:\n\n";
            dataRekap.forEach((d, i) => {
                bodyText += `${i+1}. ${d.nama} | ${d.kelas} | ${d.mapel} | Nilai: ${d.nilai}\n`;
            });

            window.location.href = `mailto:${emailGuru}?subject=Rekap Nilai&body=${encodeURIComponent(bodyText)}`;
        }

        function aturPIN() {
            const pinTersimpan = localStorage.getItem('pinGuru');
            if (!pinTersimpan) {
                const pinBaru = prompt("Buat PIN Keamanan Baru:");
                if (pinBaru) {
                    localStorage.setItem('pinGuru', pinBaru);
                    alert("PIN Berhasil disimpan.");
                }
            } else {
                const verifikasi = prompt("Masukkan PIN Lama atau PIN Darurat:");
                if (verifikasi === pinTersimpan || verifikasi === PIN_DARURAT) {
                    const pinBaru = prompt("Masukkan PIN Baru:");
                    if (pinBaru) {
                        localStorage.setItem('pinGuru', pinBaru);
                        alert("PIN Berhasil diperbarui.");
                    }
                } else if (verifikasi !== null) {
                    alert("PIN Salah!");
                }
            }
        }

        function hapusRiwayat() {
            const pinTersimpan = localStorage.getItem('pinGuru');
            if (!pinTersimpan) return alert("Atur PIN terlebih dahulu!");

            const inputPin = prompt("Masukkan PIN untuk menghapus semua data:");
            if (inputPin === pinTersimpan || inputPin === PIN_DARURAT) {
                if (confirm("Hapus semua riwayat? Tindakan ini permanen.")) {
                    localStorage.removeItem('dataKuis');
                    tampilkanData();
                }
            } else if (inputPin !== null) {
                alert("PIN Salah!");
            }
        }
    </script>
</body>
</html>
